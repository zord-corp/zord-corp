<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORD | Terminal de Sellado PQC</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; color: #2c3e50; text-align: center; padding: 50px; }
        .terminal { background: #ffffff; max-width: 600px; margin: auto; padding: 40px; border-radius: 12px; border: 2px solid #00bfa5; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #00bfa5; margin-bottom: 5px;}
        .subtitle { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 30px;}
        .input-box { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 20px; box-sizing: border-box; font-family: monospace; font-size: 1rem;}
        .btn-sellar { background-color: #673ab7; color: white; padding: 15px 30px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; font-size: 1rem; transition: background 0.3s;}
        .btn-sellar:hover { background-color: #512da8; }
        #status { margin-top: 20px; font-weight: bold; font-family: monospace; padding: 10px; border-radius: 6px;}
    </style>
</head>
<body>

    <div class="terminal">
        <h2>🛡️ Terminal de Sellado Lazarus</h2>
        <div class="subtitle">Autenticación Requerida | Motor ML-DSA-44</div>
        
        <div style="text-align: left;">
            <label style="font-weight: bold; font-size: 0.85rem;">1. Ingrese su Credencial de Acceso (API KEY):</label>
            <input type="text" id="apiKey" class="input-box" placeholder="Ej: ZORD-PRO-ABC123XYZ987">
            
            <label style="font-weight: bold; font-size: 0.85rem;">2. Seleccione el Activo Digital a Blindar (PDF, ZIP, DOCX):</label>
            <input type="file" id="docToSign" class="input-box" style="font-family: inherit;">
        </div>

        <button onclick="generarSello()" class="btn-sellar" id="btnSellar">EJECUTAR SELLADO CUÁNTICO</button>
        <div id="status"></div>
    </div>

    <script>
        async function generarSello() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const fileInput = document.getElementById('docToSign');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnSellar');

            if (!apiKey) {
                alert("ALERTA DE SEGURIDAD: Debe ingresar una API KEY válida.");
                return;
            }
            if (!fileInput.files[0]) {
                alert("Debe seleccionar un archivo para sellar.");
                return;
            }

            statusDiv.style.background = "#fff3e0";
            statusDiv.style.color = "#d35400";
            statusDiv.innerHTML = "⏳ Verificando credenciales y procesando firma... Espere.";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('api_key', apiKey);
            formData.append('documento', fileInput.files[0]);

            try {
                const response = await fetch('https://zsusy-zsecure-engine.onrender.com/api/v1/sellar', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = fileInput.files[0].name + '.sig';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    
                    statusDiv.style.background = "#e8f5e9";
                    statusDiv.style.color = "#2e7d32";
                    statusDiv.innerHTML = "✅ ¡Sello exitoso! Se ha descontado 1 crédito de su cuenta. Archivo descargado.";
                } else {
                    const err = await response.json();
                    statusDiv.style.background = "#ffebee";
                    statusDiv.style.color = "#c62828";
                    statusDiv.innerHTML = "❌ Acceso Denegado: " + (err.message || "Error desconocido");
                }
            } catch (error) {
                statusDiv.style.background = "#ffebee";
                statusDiv.style.color = "#c62828";
                statusDiv.innerHTML = "❌ Error de conexión con el Servidor ZORD.";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
